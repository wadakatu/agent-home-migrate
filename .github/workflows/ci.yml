name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install .

      - name: Verify CLI entry point
        run: ahm --version

      - name: Verify installed version metadata
        run: |
          python -c 'from importlib.metadata import version; from agent_home_migrate import __version__; assert version("agent-home-migrate") == __version__'

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile sources
        run: python -m compileall -q src tests

  age-integration:
    name: age encrypted round trip
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install package
        run: python -m pip install .

      - name: Install age
        run: |
          sudo apt-get update
          sudo apt-get install --yes age
          age --version
          age-keygen --version

      - name: Run real age round trip
        env:
          AHM_REQUIRE_AGE: "1"
        run: python -m unittest discover -s tests -p 'test_age_integration.py' -v
